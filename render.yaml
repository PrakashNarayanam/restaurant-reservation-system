services:
  # Backend Web Service
  - type: web
    name: tableease-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: supersecretkeyrestaurant123!@#
      - key: MONGODB_URI
        value: mongodb+srv://new-user:SYhDLwJ3v51O9kTm@cluster0.s6vpok1.mongodb.net/?appName=Cluster0

  # Frontend Static Site
  - type: web
    name: tableease-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=31536000
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: tableease-backend
          property: url
          # We need to append '/api' to the URL. Render's blueprint allows referencing, but since Vite bakes it, we can also manually input it or let Render compile it.
